services:

  # ── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nlq-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Points to your local Gemma2 — host.docker.internal resolves
      # to the Docker host on Mac/Windows. On Linux, use the LAN IP
      # directly (e.g. http://192.168.1.17:3000) or add:
      #   extra_hosts:
      #     - "host.docker.internal:host-gateway"
      GEMMA2_BASE_URL: ${GEMMA2_BASE_URL:-http://192.168.1.17:3000}
      GEMMA2_MODEL:    ${GEMMA2_MODEL:-gemma2}
      GEMMA2_TIMEOUT:  ${GEMMA2_TIMEOUT:-60}
      DB_PATH:         /data/nlq_app.db
    volumes:
      # SQLite DB persists across restarts
      - db-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (Vite build → nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nlq-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ────────────────────────────────────────────────────
volumes:
  db-data:
    driver: local
