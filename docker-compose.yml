services:

  # ── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nlq-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HF_TOKEN:    ${HF_TOKEN}
      HF_MODEL:    ${HF_MODEL:-openai/gpt-oss-120b}
      HF_TIMEOUT:  ${HF_TIMEOUT:-60}
      DB_PATH:     /data/nlq_app.db
      UPLOAD_DIR:  /data/uploads
    volumes:
      - db-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (Vite build → nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nlq-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ────────────────────────────────────────────────────
volumes:
  db-data:
    driver: local